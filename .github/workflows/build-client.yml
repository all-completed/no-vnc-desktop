name: Build Client

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS x64
            os: macos-15-intel
            artifact_name: no-vnc-desktop-macos-x64
            builder_args: --mac zip --x64
          - name: macOS arm64
            os: macos-latest
            artifact_name: no-vnc-desktop-macos-arm64
            builder_args: --mac zip --arm64
          - name: Windows x64
            os: windows-latest
            artifact_name: no-vnc-desktop-windows-x64
            builder_args: --win nsis --x64
          - name: Windows arm64
            os: windows-11-arm
            artifact_name: no-vnc-desktop-windows-arm64
            builder_args: --win nsis --arm64
          - name: Linux snap x64
            os: ubuntu-latest
            artifact_name: no-vnc-desktop-linux-snap-x64
            builder_args: --linux snap --x64
            snapcraft_build_environment: ""
            use_system_fpm: ""
          - name: Linux snap arm64
            os: ubuntu-24.04-arm
            artifact_name: no-vnc-desktop-linux-snap-arm64
            builder_args: --linux snap --arm64
            snapcraft_build_environment: host
            use_system_fpm: "true"

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build

      - name: Install snapcraft for Linux arm64 snap builds
        if: ${{ matrix.name == 'Linux snap arm64' }}
        run: |
          sudo apt-get update
          sudo snap install snapcraft --classic

      - name: Package Electron app
        env:
          SNAPCRAFT_BUILD_ENVIRONMENT: ${{ matrix.snapcraft_build_environment }}
          USE_SYSTEM_FPM: ${{ matrix.use_system_fpm }}
        run: npx electron-builder ${{ matrix.builder_args }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.msi
            release/*.AppImage
            release/*.snap
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error
